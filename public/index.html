<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Bawana Scorm Packager</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .container {
            text-align: center;
        }

        .logo {
            width: 320px;
            margin-bottom: 30px;
        }

        .title {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #333;
            margin-bottom: 25px;
        }

        .drop-area {
            width: 420px;
            height: 220px;
            border: 2px dashed #4a90e2;
            border-radius: 12px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: pointer;
            transition: 0.2s;
        }

        .drop-area.dragover {
            background: #eef5ff;
            border-color: #2b6cb0;
        }

        .drop-text {
            font-size: 18px;
            color: #444;
            margin-bottom: 10px;
        }

        .file-name {
            font-size: 14px;
            color: #888;
        }

        .filename-input {
            margin-top: 20px;
        }

        .filename-input input {
            padding: 8px 10px;
            width: 260px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        #outputName {
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            padding: 10px 22px;
            border: none;
            border-radius: 6px;
            background: #4a90e2;
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: none;
        }

        button:hover {
            background: #2b6cb0;
        }

        .loader {
            margin-top: 20px;
            display: none;
            font-size: 14px;
            color: #666;
        }

        .progress-bar-wrap {
            width: 300px;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            margin: 10px auto 0;
            overflow: hidden;
            display: none;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: #4a90e2;
            border-radius: 5px;
            transition: width 0.3s ease;
        }
    </style>
</head>

<body>

    <div class="container">

        <img src="/logo.png" class="logo">

        <h1 class="title">SCORM-PACKAGER</h1>

        <div id="dropArea" class="drop-area">
            <div class="drop-text">
                Drop your PDF or Genially ZIP file here
                <br>
                <small>click to browse</small>
            </div>

            <div class="file-name" id="fileName"></div>

            <input type="file" id="fileInput" hidden accept=".zip,.pdf,application/pdf,application/zip">

        </div>

        <div class="filename-input" id="filenameContainer" style="display:none;">
            <input id="outputName" type="text" placeholder="Input SCORM file-name">
        </div>

        <button id="convertBtn">Process</button>

        <button id="downloadBtn">Download SCORM</button>

        <div id="loader" class="loader">
            <span id="loaderText">Processing...</span>
            <div class="progress-bar-wrap" id="progressBarWrap">
                <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>
        </div>

    </div>

    <script>

        const dropArea = document.getElementById("dropArea")
        const fileInput = document.getElementById("fileInput")
        const convertBtn = document.getElementById("convertBtn")
        const downloadBtn = document.getElementById("downloadBtn")
        const loader = document.getElementById("loader")
        const loaderText = document.getElementById("loaderText")
        const progressBarWrap = document.getElementById("progressBarWrap")
        const progressBarFill = document.getElementById("progressBarFill")
        const fileName = document.getElementById("fileName")
        const outputName = document.getElementById("outputName")
        const filenameContainer = document.getElementById("filenameContainer")

        let uploadedFile = null
        let downloadId = null

        function setProgress(pct, msg) {
            loaderText.textContent = msg ? `Processing... ${pct}% — ${msg}` : `Processing... ${pct}%`
            progressBarFill.style.width = pct + "%"
        }

        function resetProgress() {
            progressBarFill.style.width = "0%"
            loaderText.textContent = "Processing..."
        }

        dropArea.onclick = () => fileInput.click()

        fileInput.onchange = e => {

            uploadedFile = e.target.files[0]

            fileName.innerText = uploadedFile.name

            filenameContainer.style.display = "block"

            let baseName = uploadedFile.name.replace(/\.(zip|pdf)$/i, "")

            // set default nama output
            outputName.value = baseName + ".zip"

            convertBtn.style.display = "inline-block"

        }

        dropArea.addEventListener("dragover", e => {
            e.preventDefault()
            dropArea.classList.add("dragover")
        })

        dropArea.addEventListener("dragleave", () => {
            dropArea.classList.remove("dragover")
        })

        dropArea.addEventListener("drop", e => {

            e.preventDefault()

            dropArea.classList.remove("dragover")

            uploadedFile = e.dataTransfer.files[0]

            fileName.innerText = uploadedFile.name

            filenameContainer.style.display = "block"

            let baseName = uploadedFile.name.replace(/\.(zip|pdf)$/i, "")

            outputName.value = baseName + ".zip"

            convertBtn.style.display = "inline-block"

        })

        convertBtn.onclick = async () => {

            if (!uploadedFile) return

            convertBtn.style.display = "none"
            resetProgress()
            loader.style.display = "block"
            progressBarWrap.style.display = "block"

            try {
                const form = new FormData()
                form.append("file", uploadedFile)

                setProgress(0, "Uploading…")

                const uploadRes = await fetch("/upload", { method: "POST", body: form })
                if (!uploadRes.ok) {
                    const msg = await uploadRes.text()
                    throw new Error(msg || "Upload gagal")
                }

                const { id } = await uploadRes.json()
                setProgress(2, "Starting conversion…")

                await new Promise((resolve, reject) => {
                    const es = new EventSource("/convert-sse/" + id)

                    es.onmessage = (evt) => {
                        try {
                            const d = JSON.parse(evt.data)
                            if (d.error) {
                                es.close()
                                reject(new Error(d.error))
                                return
                            }
                            if (d.percent != null) {
                                setProgress(d.percent, d.message || "")
                            }
                            if (d.done) {
                                downloadId = d.downloadId
                                es.close()
                                resolve()
                            }
                        } catch (_) { /* ignore parse errors */ }
                    }

                    es.onerror = () => {
                        es.close()
                        reject(new Error("Connection lost"))
                    }
                })

                loader.style.display = "none"
                progressBarWrap.style.display = "none"
                downloadBtn.style.display = "inline-block"

            } catch (err) {
                loader.style.display = "none"
                progressBarWrap.style.display = "none"
                convertBtn.style.display = "inline-block"
                alert(err.message || "Gagal memproses file")
            }
        }

        downloadBtn.onclick = async () => {

            let filename = outputName.value.trim()

            filename = filename
                .replace(/\s+/g, "_")
                .replace(/[^\w\-\.]/g, "")

            if (!filename.endsWith(".zip")) {
                filename += ".zip"
            }

            const res = await fetch("/download/" + downloadId)
            const blob = await res.blob()
            const url = URL.createObjectURL(blob)

            const a = document.createElement("a")
            a.href = url
            a.download = filename
            a.click()

            URL.revokeObjectURL(url)

        }

    </script>

</body>

</html>
