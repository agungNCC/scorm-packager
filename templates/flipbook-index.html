<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Flipbook</title>
    <link rel="stylesheet" href="flipbook-stpageflip.css">
</head>

<body>
    <div class="app" id="appRoot">
        <header class="header-bar" aria-hidden="true"></header>

        <main class="main-stage" id="mainStage">
            <div class="flipbook-host">
                <div id="flipbook"></div>
            </div>
        </main>

        <footer class="footer-bar">
            <nav class="nav-shell" aria-label="Navigasi halaman">
                <button type="button" class="nav-btn" id="btnFirst" aria-label="Halaman pertama" title="Pertama">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="5" y1="5" x2="5" y2="19" />
                        <polyline points="11 7 6 12 11 17" />
                        <polyline points="17 7 12 12 17 17" />
                    </svg>
                </button>
                <button type="button" class="nav-btn" id="btnPrev" aria-label="Sebelumnya" title="Sebelumnya">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M14 6l-6 6 6 6" />
                    </svg>
                </button>
                <span class="page-indicator" id="pageIndicator">—</span>
                <button type="button" class="nav-btn" id="btnNext" aria-label="Berikutnya" title="Berikutnya">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M10 6l6 6-6 6" />
                    </svg>
                </button>
                <button type="button" class="nav-btn" id="btnLast" aria-label="Halaman terakhir" title="Terakhir">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="13 7 18 12 13 17" />
                        <polyline points="7 7 12 12 7 17" />
                        <line x1="19" y1="5" x2="19" y2="19" />
                    </svg>
                </button>
            </nav>
        </footer>
    </div>

    <div class="loading-overlay is-visible" id="loadingOverlay">Memuat PDF…</div>

    <!-- StPageFlip (MIT, npm page-flip) — lokal, tanpa CDN -->
    <script src="page-flip.browser.js"></script>
    <script src="SCORM_API_wrapper.min.js"></script>
    <script src="scorm.js"></script>
    <script type="module" src="flipbook-stpageflip.mjs"></script>
</body>

</html>
